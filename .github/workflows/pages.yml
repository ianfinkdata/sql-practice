name: Deploy Pages

# Publishes a combined GitHub Pages site:
#   /            -> sql-trainer/docs/ (SQL Trainer, unchanged)
#   /medallion/  -> reports/ (Oakhaven medallion exploratory reports)
# One-time setup: in the repo, go to Settings → Pages → Build and deployment
# → Source, and choose "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "sql-trainer/docs/**"
      - "reports/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble combined site
        run: |
          set -e
          mkdir -p _site
          cp -r sql-trainer/docs/. _site/
          mkdir -p _site/medallion
          cp -r reports/. _site/medallion/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
